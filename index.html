<html lang="ko"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Work Philosophy</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #244f5c;
      --text: #fff48a;
      --line: rgba(255, 255, 255, 0.42);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100dvh;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", sans-serif;
    }

    .poster {
      width: min(100%, 430px);
      min-height: calc(100dvh - 36px);
      padding-top: 8px;
      text-align: left;
    }

    .badge {
      width: fit-content;
      margin: 0 auto 32px;
      padding: 4px 24px 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.8);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 16px;
      font-style: italic;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: center;
    }

    .mantra {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      padding: 21px 14px 23px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .phrase {
      color: var(--text);
      font-size: min(31px, 8.6vw);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: 0;
      text-align: left;
      word-break: keep-all;
    }

    .phrase span {
      display: block;
      white-space: nowrap;
    }

    @media (min-width: 900px) {
      body {
        padding: 34px 24px;
      }

      .poster {
        width: 100%;
        max-width: none;
        min-height: auto;
        padding-top: 0;
        text-align: center;
      }

      .badge {
        margin: 0 auto 28px;
        font-size: 24px;
      }

      .mantra {
        margin: 0 auto;
        padding: 28px 24px 30px;
      }

      .phrase {
        font-size: 40px;
        line-height: 1.05;
        text-align: center;
        white-space: nowrap;
      }

      .phrase span {
        display: inline;
      }

      .phrase span + span::before {
        content: " ";
      }
    }
  </style>
</head>
<body>
  <main class="poster">
    <div class="badge">Work Philosophy</div>

    <section class="mantra" aria-label="일의 신조">
      <h1 class="phrase">
        <span>각자</span>
        <span>자기 위치에서</span>
        <span>최선을 다하고</span>
        <span>열심히 살아간다.</span>
      </h1>
    </section>
  </main>


</body></html>
